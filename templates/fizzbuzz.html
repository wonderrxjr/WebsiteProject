{% extends 'base.html' %}

{% block title %}FizzBuzz{% endblock %}

{% block content %}
<form action="/fizzbuzz" method="post">
    <div class="mb-3">
        <label for="fizzbuzzin" class="form-label">How much FizzBuzz do you want to play?</label>
        <input type="text" class="form-control" id="fizzbuzzin" name="fizzbuzz">
    </div>
    <button type="submit" class="btn btn-primary">Submit</button>
</form>
{% endblock %}
